name: Test DMT Lint (Manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to test'
        required: false
        default: ''
        type: string

jobs:
  test-dmt-lint:
    name: Test DMT Lint with TRDL
    runs-on: [self-hosted, regular]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Setup TRDL
        uses: deckhouse/modules-actions/trdl-install@feat/trdl-action

      - name: DMT lint
        env:
          DMT_METRICS_URL: "${{ secrets.DMT_METRICS_URL }}"
          DMT_METRICS_TOKEN: "${{ secrets.DMT_METRICS_TOKEN }}"
        run: |
          make dmt-lint

