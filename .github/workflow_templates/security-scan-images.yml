{!{- $pullRequestContext := coll.Dict "pullRequestRefField" "needs.pull_request_info.outputs.ref" "withDispatch" true -}!}
{!{- $ctx := coll.Merge $pullRequestContext . }!}

name: Security Scan Images

# Image-based scans (CVE / rootless / antivirus). Triggered exclusively by the
# Build workflow once `Build FE` succeeds (see `trigger_security_scan_images`
# job in build-and-test_dev). Every build re-run automatically yields a fresh
# images-scan run.
#
# Re-run semantics:
#   * Re-running this workflow ("Re-run all jobs" on the Security Scan Images
#     run itself) preserves `inputs.build_run_id`, so it will pull artifacts
#     from the SAME original Build run that dispatched this scan. That is
#     intentional: SHA-consistent re-execution of the same scan.
#   * To scan against a freshly rebuilt artifact set, re-run the BUILD
#     workflow ("Build and test for dev branches"). Build will re-dispatch
#     this workflow with its new `github.run_id`, and the previous Security
#     Scan Images run gets cancelled by this workflow's concurrency group.
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Pull request number to scan."
        required: true
      build_run_id:
        description: "GitHub Actions run ID of the Build workflow that produced build_report_FE for this PR."
        required: true

# Cancel in-progress image scans for the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.issue_number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
{!{ tmpl.Exec "pull_request_info_job" $ctx | strings.Indent 2 }!}

  # ============================================================================
  # Compute the set of module images that actually changed in this PR.
  # The job downloads the FE build report (images_tags_werf.json) directly
  # by `inputs.build_run_id` (passed in from the Build workflow that
  # dispatched this scan), keeps only Rebuilt=false entries (werf cache hits
  # == identical to main) as digests_old_main.json, then pulls
  # images_digests.json out of the assembled dev:prN image and diffs them
  # by content digest. The resulting changed_images.json plus outputs
  # (changed_count / matrix / changed_compact) drive subsequent
  # CVE / rootless / antivirus scans.
  # ============================================================================
  changed_images:
    name: Compute changed images
    runs-on: [self-hosted, regular]
    needs:
      - pull_request_info
    if: github.repository == 'deckhouse/deckhouse'
    permissions:
      contents: read
      id-token: write
    outputs:
      changed_count:   ${{ steps.diff.outputs.changed_count }}
      matrix:          ${{ steps.diff.outputs.matrix }}
      changed_compact: ${{ steps.diff.outputs.changed_compact }}
    steps:
{!{ tmpl.Exec "checkout_full_step" $ctx | strings.Indent 6 }!}

      - name: Set PR tag
        id: tag
        env:
          PR_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          REPO_SUFFIX=${GITHUB_REPOSITORY#deckhouse/deckhouse-}
          if [[ ${REPO_SUFFIX} == ${GITHUB_REPOSITORY} ]] ; then
            TAG="pr${PR_NUMBER}"
          else
            TAG="pr${PR_NUMBER}-${REPO_SUFFIX}"
          fi
          echo "TAG=${TAG}" >> $GITHUB_OUTPUT
{!{- $secrets := slice -}!}
{!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host" "DECKHOUSE_DEV_REGISTRY_HOST" "DECKHOUSE_DEV_REGISTRY_HOST" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/dev-registry/writetoken" "login" "DECKHOUSE_DEV_REGISTRY_USER" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/dev-registry/writetoken" "password" "DECKHOUSE_DEV_REGISTRY_PASSWORD" ) $secrets -}!}
{!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/team-ssdlc/loop" "webhook_url" "LOOP_SERVICE_NOTIFICATIONS" ) $secrets -}!}
{!{ tmpl.Exec "import_secrets" $secrets | strings.Indent 6 }!}

      - name: Download build_report_FE artifact from Build run
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.BOATSWAIN_GITHUB_TOKEN }}
          run_id: ${{ github.event.inputs.build_run_id }}
          name: build_report_FE
          path: ./build_report
          if_no_artifact_found: fail

      - name: Login to dev registry
        uses: {!{ index (ds "actions") "docker/login-action" }!}
        with:
          registry: ${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_HOST }}
          username: ${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_USER }}
          password: ${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_PASSWORD }}
          logout: false

      - name: Extract images_digests.json from dev:${{ steps.tag.outputs.TAG }}
        env:
          DEV_REGISTRY: ${{ steps.secrets.outputs.DECKHOUSE_DEV_REGISTRY_HOST }}
          TAG: ${{ steps.tag.outputs.TAG }}
        run: |
          set -euo pipefail
          regctl image get-file "${DEV_REGISTRY}/sys/deckhouse-oss:${TAG}" \
            /deckhouse/modules/images_digests.json > images_digests.json
          modules=$(jq 'keys | length' images_digests.json)
          images=$(jq '[.[] | to_entries[]] | length' images_digests.json)
          echo "images_digests.json: ${modules} modules, ${images} module images."

      - name: Compute changed images
        id: diff
        env:
          BUILD_REPORT_PATH:   ./build_report/images_tags_werf.json
          IMAGES_DIGESTS_PATH: ./images_digests.json
          OUTPUT_OLD_DIGESTS:  ./digests_old_main.json
          OUTPUT_CHANGED:      ./changed_images.json
        run: |
          python3 .github/scripts/python/changed_images.py

      - name: Upload diff artifacts
        if: ${{ always() && steps.diff.outcome != 'skipped' }}
        uses: {!{ index (ds "actions") "actions/upload-artifact" }!}
        with:
          name: changed-images-pr${{ github.event.inputs.issue_number }}
          path: |
            digests_old_main.json
            changed_images.json
          retention-days: 14
{!{ tmpl.Exec "send_fail_report" . | strings.Indent 6 }!}

  # ============================================================================
  # CVE — Trivy scan on PR images.
  # TEMPORARILY DISABLED: PR-mode CVE scan currently misbehaves (false-positive
  # noise / wrong PR-diff filter). Re-enable by removing the `if: false` guard
  # once the underlying script is fixed. While disabled, the aggregator below
  # explicitly allows `cve: skipped`, so it does not block PR merges.
  # ============================================================================
  test_cve_report_main:
    name: Trivy scan dev images
    if: ${{ false }}
    # External/fork PRs gated by 'status/ok-to-test' via pull_request_info (setFailed → this job is skipped).
    needs:
      - pull_request_info
      - changed_images
    permissions:
      contents: read
      id-token: write
    runs-on: [self-hosted, large]
    env:
      WORKDIR: "cve-scan"
    steps:
{!{ tmpl.Exec "checkout_full_step"           $ctx | strings.Indent 6 }!}
{!{ tmpl.Exec "link_bin_step"                     | strings.Indent 6 }!}
{!{ tmpl.Exec "cve_scan_type_pr"                  | strings.Indent 6 }!}
{!{ tmpl.Exec "cve_scan_deckhouse_images"         | strings.Indent 6 }!}
{!{ tmpl.Exec "cve_tests_upload_reports_artifacts"| strings.Indent 6 }!}
{!{ tmpl.Exec "unlink_bin_step"                   | strings.Indent 6 }!}
{!{ tmpl.Exec "send_fail_report" .                | strings.Indent 6 }!}

{!{ tmpl.Exec "set_security_scan_requirement_status" slice | strings.Indent 2 }!}

  # ============================================================================
  # Rootless — default-user validation on PR images.
  # ============================================================================
  security_scan_images:
    name: Security scan images
    runs-on: [self-hosted, large]
    needs:
      - pull_request_info
      - changed_images
{!{ tmpl.Exec "security_scan_template" (slice $ctx "pr" "with_fail_report") | strings.Indent 4 }!}

{!{ tmpl.Exec "set_security_rootless_requirement_status" $ctx | strings.Indent 2 }!}

  # ============================================================================
  # Antivirus — Dr.Web and Kaspersky scans on PR images.
  # ============================================================================
  get-tags:
    name: Get PR tag for scanning
    runs-on: ubuntu-slim
    needs:
      - pull_request_info
    if: github.repository == 'deckhouse/deckhouse'
    outputs:
      tags: ${{ steps.set-pr-tag.outputs.tags }}
    steps:
      - name: Set PR tag
        id: set-pr-tag
        env:
          PR_NUMBER: ${{ github.event.inputs.issue_number }}
        run: |
          REPO_SUFFIX=${GITHUB_REPOSITORY#deckhouse/deckhouse-}
          if [[ ${REPO_SUFFIX} == ${GITHUB_REPOSITORY} ]] ; then
            TAG="pr${PR_NUMBER}"
          else
            TAG="pr${PR_NUMBER}-${REPO_SUFFIX}"
          fi
          echo "PR tag to scan: $TAG"
          echo "tags=$(printf '%s' "$TAG" | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

{!{ tmpl.Exec "drweb_scan_job" . | strings.Indent 2 }!}

{!{ tmpl.Exec "kaspersky_scan_job" . | strings.Indent 2 }!}

{!{ tmpl.Exec "set_security_antivirus_requirement_status" . | strings.Indent 2 }!}

{!{ tmpl.Exec "antivirus_notify_failure_job" . | strings.Indent 2 }!}

  # ============================================================================
  # Aggregator — single required check for branch protection.
  # Fails if any image scan did not finish with success
  # (covers blocker failure, scan failure, and skipped due to upstream issues).
  # ============================================================================
  security_scan_images_required:
    name: Security scan images required
    runs-on: ubuntu-slim
    if: ${{ always() && needs.pull_request_info.result == 'success' }}
    needs:
      - pull_request_info
      - changed_images
      - test_cve_report_main
      - security_scan_images
      - drweb-scan
      - kaspersky-scan
    steps:
      - name: Aggregate scan results
        run: |
          declare -A results=(
            [changed_images]="${{ needs.changed_images.result }}"
            [cve]="${{ needs.test_cve_report_main.result }}"
            [rootless]="${{ needs.security_scan_images.result }}"
            [drweb]="${{ needs.drweb-scan.result }}"
            [kaspersky]="${{ needs.kaspersky-scan.result }}"
          )
          # Antivirus jobs intentionally skip in test repositories (self-hosted antivirus runners are only in main repo).
          IS_MAIN_REPO=false
          if [[ "${{ github.repository }}" == "deckhouse/deckhouse" ]]; then
            IS_MAIN_REPO=true
          fi

          failed=0
          for name in "${!results[@]}"; do
            r="${results[$name]}"
            if [[ "$r" == "success" ]]; then
              echo "✅ $name: $r"
              continue
            fi
            # CVE PR-mode is temporarily disabled (test_cve_report_main has `if: false`); allow skipped until re-enabled.
            if [[ "$name" == "cve" && "$r" == "skipped" ]]; then
              echo "ℹ️  $name: $r (temporarily disabled)"
              continue
            fi
            if [[ "$IS_MAIN_REPO" == "false" && ( "$name" == "drweb" || "$name" == "kaspersky" ) && "$r" == "skipped" ]]; then
              echo "ℹ️  $name: $r (allowed in test repository)"
              continue
            fi
            echo "::error::Scan '$name' result: $r"
            failed=1
          done
          exit $failed
