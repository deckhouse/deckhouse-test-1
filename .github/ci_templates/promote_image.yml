{!{ define "promote_image" }!}
{!{- $ctx := . -}!}
# <template: promote_image>
promote_image:
  name: Promote image to prod
  if: ${{ github.event_name == 'workflow_dispatch' }}
  runs-on: [self-hosted, stage]
  steps:
{!{ tmpl.Exec "docker_config_isolation" | strings.Indent 4 }!}

    {!{- $secrets := slice -}!}
    {!{- $secrets = append ( slice "projects/data/6db2f1ee-9b6f-4f4f-8381-2fb43060478a/github/registry_host" "DECKHOUSE_REGISTRY_STAGE_HOST" "DECKHOUSE_REGISTRY_STAGE_HOST" ) $secrets -}!}
    {!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/stage-registry/writetoken" "login" "DECKHOUSE_REGISTRY_STAGE_USER" ) $secrets -}!}
    {!{- $secrets = append ( slice "projects/data/101ceaca-97cd-462f-aed5-070d9b9de175/stage-registry/writetoken" "password" "DECKHOUSE_REGISTRY_STAGE_PASSWORD" ) $secrets -}!}
    {!{ tmpl.Exec "import_secrets" $secrets | strings.Indent 4 }!}
{!{ tmpl.Exec "login_stage_registry_step" $ctx | strings.Indent 4 }!}
{!{ tmpl.Exec "werf_install_step" $ctx | strings.Indent 4 }!}

    - name: Promote images from stage to prod
      env:
        STAGE_REGISTRY_HOST: ${{ steps.secrets.outputs.DECKHOUSE_REGISTRY_STAGE_HOST }}
        DECKHOUSE_REGISTRY_HOST: ${{ secrets.DECKHOUSE_REGISTRY_HOST }}
      run: |
        set -euo pipefail

        # CE/EE/FE -> ce/ee/fe
        REGISTRY_SUFFIX=$(echo "${WERF_ENV}" | tr '[:upper:]' '[:lower:]')

        # Same slug as release build tag publish (see build.yml).
        IMAGE_TAG=$(werf slugify --format docker-tag "${CI_COMMIT_TAG}")

        STAGE_PATH="${STAGE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"
        PROD_PATH="${DECKHOUSE_REGISTRY_HOST}/deckhouse/${REGISTRY_SUFFIX}"

        promote_with_att() {
          local SUBPATH="$1"
          local REPO_SRC REPO_DST SRC DST
          if [[ -z "${SUBPATH}" ]]; then
            REPO_SRC="${STAGE_PATH}"
            REPO_DST="${PROD_PATH}"
          else
            REPO_SRC="${STAGE_PATH}/${SUBPATH}"
            REPO_DST="${PROD_PATH}/${SUBPATH}"
          fi
          SRC="${REPO_SRC}:${IMAGE_TAG}"
          DST="${REPO_DST}:${IMAGE_TAG}"
          echo "⚓️ 💫 [$(date -u)] Promoting '${SRC}' -> '${DST}'"
          regctl image copy "${SRC}" "${DST}"
          local DIGEST
          DIGEST=$(regctl image digest "${SRC}" | sed 's/^sha256://')
          if regctl image manifest "${REPO_SRC}:sha256-${DIGEST}.att" >/dev/null 2>&1; then
            echo "⚓️ 💫 [$(date -u)] Copying attestation for '${REPO_SRC}'"
            regctl image copy "${REPO_SRC}:sha256-${DIGEST}.att" "${REPO_DST}:sha256-${DIGEST}.att"
          else
            echo "⚓️ 💫 [$(date -u)] Attestation for '${REPO_SRC}' not found, skipping..."
          fi
        }

        promote_with_att ""
        promote_with_att "install"
        promote_with_att "install-standalone"
        promote_with_att "release-channel"
# </template: promote_image>
{!{ end }!}
