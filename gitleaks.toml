# Gitleaks configuration file
# This is a basic template to test gitleaks configuration handling

[extend]
# Extend default rules
useDefault = true

[[rules]]
description = "Custom API Key Pattern"
id = "custom-api-key"
regex = '''(?i)api[_-]?key\s*[:=]\s*['"]?[0-9a-f]{32,}['"]?'''
tags = ["key", "API"]

[[rules]]
description = "Custom Token Pattern"
id = "custom-token"  
regex = '''(?i)token\s*[:=]\s*['"]?[0-9a-zA-Z]{20,}['"]?'''
tags = ["token"]

[allowlist]
description = "Allowlist for test files and documentation"
paths = [
    '''.*\.md$''',
    '''.*\.txt$''',
    '''docs/.*''',
]

# Allow certain regex patterns
regexes = [
    '''AKIAIOSFODNN7EXAMPLE''',
    '''xxxxxxxxxxxxxxxxxxxx''',
]
